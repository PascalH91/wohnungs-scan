services:
    wohnungs-scan:
        build: .
        restart: unless-stopped
        ports:
            - "8080:8080"
        env_file:
            - .env.production.local
        environment:
            # Turn the unattended scraper + email loop on in this deployment.
            ENABLE_SCHEDULER: "true"
            NODE_ENV: production
            PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
        volumes:
            # Persist discovered offers across restarts/redeploys.
            - ./data:/app/data
        # Headless Chromium needs more than the default 64MB of shared memory.
        shm_size: "1gb"
